<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Japanese Kana Trainer</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="navbar-mount"></div>

<main class="page-body">
  <div class="container">
    <div class="auth-shell card">
      <h2 class="text-center">Welcome back</h2>
      <p class="text-center text-muted mb-24">Log in to continue your streak.</p>

      <div id="form-alert" class="alert alert-error hidden"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-seal btn-block btn-lg" id="submit-btn">Log In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = "dashboard.html";

  const params = new URLSearchParams(location.search);
  if (params.get("expired")) {
    const alertBox = document.getElementById("form-alert");
    alertBox.textContent = "Your session expired — please log in again.";
    alertBox.classList.remove("hidden");
  }

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById("form-alert");
    const btn = document.getElementById("submit-btn");
    alertBox.classList.add("hidden");
    btn.disabled = true;
    btn.textContent = "Logging in…";
    try {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const { access_token } = await Api.login(username, password);
      Auth.setToken(access_token);
      const redirect = params.get("redirect");
      window.location.href = (redirect && redirect !== "login.html") ? redirect : "dashboard.html";
    } catch (err) {
      alertBox.textContent = err.message || "Login failed.";
      alertBox.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Log In";
    }
  });
</script>
</body>
</html>
